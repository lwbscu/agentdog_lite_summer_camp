run_name: our_agentdog15_continued_lora
base_model: models/AgentDoG1.5-Qwen3.5-0.8B
train_file: data/processed/train_mixed_train.jsonl
dev_file: data/processed/train_mixed_dev.jsonl
output_dir: outputs/our_agentdog15_continued_lora
max_seq_len: 8192
expected_effective_batch_size: 64
training:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 64
  learning_rate: 5.0e-6
  num_train_epochs: 2
  warmup_ratio: 0.03
  lr_scheduler_type: cosine
  bf16: true
  gradient_checkpointing: true
  save_strategy: steps
  eval_strategy: steps
  eval_steps: 100
  save_steps: 100
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  greater_is_better: false
  logging_steps: 10
  report_to: none
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
